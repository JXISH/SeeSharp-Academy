<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>待办事项</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>📝 待办事项</h1>
    
    <div class="add-task-toggle" id="addTaskToggle">
      <span>+ 添加新任务</span>
    </div>
    
    <div class="input-section collapsed" id="inputSection">
      <input type="text" id="taskInput" placeholder="输入新任务..." maxlength="100">
      <div class="input-row">
        <div class="input-group">
          <label for="priorityInput">优先级 (0-5):</label>
          <input type="number" id="priorityInput" min="0" max="5" value="0">
        </div>
        <div class="input-group">
          <label for="timeInput">估计时间 (小时):</label>
          <input type="number" id="timeInput" min="0" step="0.5" value="1">
        </div>
      </div>
      <div class="input-row">
        <div class="input-group full-width">
          <label for="deadlineInput">完成期限:</label>
          <input type="datetime-local" id="deadlineInput">
        </div>
      </div>
      <button id="addBtn">添加任务</button>
    </div>

    <div class="control-section">
      <div class="filter-section">
        <button class="filter-btn active" data-filter="all">全部</button>
        <button class="filter-btn" data-filter="pending">未完成</button>
        <button class="filter-btn" data-filter="completed">已完成</button>
      </div>
      <div class="sort-section">
        <select id="sortSelect">
          <option value="priority">按优先级排序</option>
          <option value="time">按时间排序</option>
          <option value="deadline">按期限排序</option>
        </select>
      </div>
    </div>

    <ul id="taskList" class="task-list"></ul>

    <div class="stats">
      <span id="stats"></span>
    </div>

    <div class="io-section">
      <button id="exportBtn" class="io-btn">📤 导出数据</button>
      <button id="importBtn" class="io-btn">📥 导入数据</button>
      <input type="file" id="importFile" accept=".json" style="display: none;">
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
